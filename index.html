<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리 예산 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#F5F4F0;--s:#fff;--b:#E4E2DA;--t:#1C1B18;--m:#8A8780;--a:#1D4ED8;--g:#15803D;--r:#B91C1C}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--t);font-size:14px;min-height:100vh}
nav{background:var(--t);color:#fff;height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nt{font-size:15px;font-weight:800}
.tabs{display:flex;gap:2px}
.tab{background:none;border:none;color:rgba(255,255,255,.4);font-family:inherit;font-size:13px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer}
.tab.on,.tab:hover{color:#fff;background:rgba(255,255,255,.12)}
.page{display:none;max-width:880px;margin:0 auto;padding:24px 20px}
.page.on{display:block}
.card{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.h{font-size:15px;font-weight:700;margin-bottom:14px}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--m);margin-bottom:5px}
input,textarea{width:100%;border:1.5px solid var(--b);border-radius:7px;padding:9px 11px;font-family:inherit;font-size:14px;color:var(--t);background:var(--bg);outline:none}
input:focus,textarea:focus{border-color:var(--a);background:#fff}
textarea{resize:vertical;min-height:64px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:600px){.r2{grid-template-columns:1fr}}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;white-space:nowrap}
.bp{background:var(--a);color:#fff}.bp:hover{background:#1e40af}
.bg2{background:transparent;color:var(--m);border:1.5px solid var(--b)}.bg2:hover{color:var(--t);border-color:#999}
.bG{background:var(--g);color:#fff}.bG:hover{background:#166534}
.sm{padding:5px 10px;font-size:12px}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.pc{background:var(--s);border:2px solid var(--b);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;position:relative}
.pc:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}
.pn{font-weight:700;font-size:14px;display:flex;align-items:center;margin-bottom:4px}
.pd{font-size:12px;color:var(--m);margin-bottom:8px;line-height:1.4}
.pm{font-size:11px;color:var(--m);font-weight:600;margin-bottom:8px}
.proj-actions{display:flex;gap:6px;margin-top:6px;border-top:1px solid var(--b);padding-top:8px}
.btn-edit{background:none;border:1px solid var(--b);color:var(--m);font-size:11px;padding:3px 8px;border-radius:5px;cursor:pointer;font-family:inherit}
.btn-edit:hover{border-color:var(--a);color:var(--a)}
.btn-del-proj{background:none;border:1px solid #fca5a5;color:var(--r);font-size:11px;padding:3px 8px;border-radius:5px;cursor:pointer;font-family:inherit}
.btn-del-proj:hover{background:#fef2f2}
.btn-sm-act{background:none;border:1px solid var(--b);color:var(--m);font-size:11px;padding:3px 8px;border-radius:5px;cursor:pointer;font-family:inherit;white-space:nowrap}
.done-act{border-color:#bbf7d0;color:var(--g)}.done-act:hover{background:#f0fdf4}
.undo-act{border-color:#fca5a5;color:var(--r)}.undo-act:hover{background:#fef2f2}
.edit-act:hover{border-color:var(--a);color:var(--a)}
.del-act{border-color:#fca5a5;color:var(--r)}.del-act:hover{background:#fef2f2}
.common-card{background:#f0fdf4;border:2px solid #86efac;border-radius:10px;padding:14px 18px;cursor:pointer;margin-bottom:12px;transition:all .15s}
.common-card:hover{box-shadow:0 2px 12px rgba(21,128,61,.15)}
.sw-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;display:inline-block;margin-right:4px}
.sw-dot.son{border-color:var(--t);transform:scale(1.15)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--m);padding:8px 10px;text-align:left;border-bottom:1.5px solid var(--b);background:var(--bg)}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--b);vertical-align:middle;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.ft td{font-weight:700;background:var(--bg)}
.la{color:var(--a);font-size:12px;text-decoration:none}.la:hover{text-decoration:underline}
.bk{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:700}
.vd{background:#dcfce7;color:var(--g)}.vs{background:#dbeafe;color:var(--a)}.vp{background:#fef3c7;color:#92400e}
.pbl{border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-bottom:18px;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.ph{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;color:#fff}
.phn{font-weight:700;font-size:15px}.phs{font-size:12px;opacity:.8;margin-top:2px}.pht{font-size:20px;font-weight:800}
.st{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px 16px}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--m);margin-bottom:3px}
.sv{font-size:22px;font-weight:800;letter-spacing:-.5px}
@media(max-width:600px){.st{grid-template-columns:1fr}}
.emp{text-align:center;padding:40px 20px;color:var(--m)}
.ei{font-size:36px;margin-bottom:10px}
.et{font-size:14px;font-weight:700;color:var(--t);margin-bottom:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--t);color:#fff;padding:11px 18px;border-radius:40px;font-size:13px;font-weight:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
.sh{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
.ss{color:var(--m);font-size:13px;margin-bottom:20px}
.warn-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 14px;font-size:12px;color:#9a3412;margin-bottom:14px}
@media(max-width:600px){
  .tbl thead{display:none}
  .tbl tr{display:block;border:1px solid var(--b);border-radius:8px;margin-bottom:8px;padding:8px}
  .tbl td{display:flex;justify-content:space-between;border:none;padding:4px 0;font-size:13px}
  .tbl td:before{content:attr(data-label);font-weight:600;color:var(--m);font-size:11px;margin-right:8px}
  .ft{display:none}
}
</style>
</head>

    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="h" style="margin-bottom:0">입력된 부품</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div id="tl" style="font-size:13px;color:var(--m)"></div>
          <button id="btn-showaddpart" class="btn bp sm">+ 부품 추가</button>
        </div>
      </div>
      <div id="pe" class="emp">
        <div class="ei">&#128230;</div>
        <div class="et">아직 부품이 없어요</div>
      </div>
      <div id="ptw" style="display:none;overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>#</th><th>부품명 / 목적</th><th>링크</th>
            <th>수량</th><th>단가</th><th>합계</th><th>상태</th><th></th>
          </tr></thead>
          <tbody id="ptb"></tbody>
          <tfoot>
            <tr class="ft">
              <td colspan="5" style="padding:10px">총 예산</td>
              <td id="ptt" style="padding:10px;font-size:15px"></td>
              <td colspan="2"></td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div id="sbw" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--b);display:none">
        <button id="sbb" class="btn bp" style="display:none"></button>
      </div>
    </div>
  </div>
</div>

<div id="pa" class="page">
  <div class="sh">예산 현황 관리</div>
  <div class="ss">전체 예산을 검토하고 구매 완료 처리하세요</div>
  <div id="ast" class="st"></div>
  <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px">
    <button id="btn-dlxls" class="btn bG">&#128229; 엑셀 다운로드</button>
    <button id="btn-clrall" class="btn bg2 sm">&#128465; 초기화</button>
  </div>
  <div id="ac"></div>
</div>

<script>
// 관리자: URL에 ?admin=1847 파라미터로 접근
var KEY = "cb10", curProj = null, selC = 0, editProjId = null, editPartId = null;

var FB_URL = "https://robotclub-budget-default-rtdb.firebaseio.com";

function fbLoad(cb){
  fetch(FB_URL + "/clubdata.json")
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d && Array.isArray(d.p)){
        localStorage.setItem(KEY, JSON.stringify(d));
      }
      cb();
    })
    .catch(function(){ cb(); });
}

function fbSave(d){
  fetch(FB_URL + "/clubdata.json", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(d)
  }).catch(function(){});
}

var CHEX = ["#2563eb","#16a34a","#dc2626","#d97706","#7c3aed","#db2777","#0891b2","#65a30d"];
var CRGB = ["D6E4FF","D6FFD6","FFD6D6","FFF0D6","ECD6FF","FFD6F0","D6F5FF","FFF9D6"];

/* 데이터 */
function ld(){try{return JSON.parse(localStorage.getItem(KEY))||{p:[],t:[]};}catch(e){return{p:[],t:[]};}}
function sv(d){
  localStorage.setItem(KEY,JSON.stringify(d));
  fbSave(d);
}


function init(){
  var d=ld();
  if(!d.p.find(function(x){return x.id==="com";})){
    d.p.unshift({id:"com",name:"\uACF5\uC6A9\uBB3C\uD488",lead:"\uC804\uCCB4",desc:"\uBAA8\uB4E0 \uD300 \uACF5\uD1B5 \uBB3C\uD488",ci:7});
    sv(d);
  }
  return d;
}

/* 토스트 */
function toast(m,warn){
  var e=document.getElementById("toast");
  e.textContent=m;
  e.style.background=warn?"#b91c1c":"";
  e.classList.add("on");
  clearTimeout(e._t);
  e._t=setTimeout(function(){e.classList.remove("on");},2500);
}

/* 페이지 전환 */
var adminOn=false;
function goAdmin(){
  if(adminOn){showPage("a");return;}
  var m=document.getElementById("pwm");
  m.style.display="flex";
  setTimeout(function(){document.getElementById("pwi").focus();},100);
}
function chkPw(){
  if(document.getElementById("pwi").value==="1847"){
    adminOn=true;clsPw();showPage("a");
  }else{
    document.getElementById("pwe").style.display="block";
    document.getElementById("pwi").select();
  }
}
function clsPw(){
  document.getElementById("pwm").style.display="none";
  document.getElementById("pwi").value="";
  document.getElementById("pwe").style.display="none";
}

function customConfirm(msg, onYes){
  var m=document.getElementById("cfm");
  document.getElementById("cfm-msg").textContent=msg;
  m.style.display="flex";
  var yBtn=document.getElementById("cfm-yes");
  var nBtn=document.getElementById("cfm-no");
  function cleanup(){m.style.display="none";yBtn.onclick=null;nBtn.onclick=null;}
  yBtn.onclick=function(){cleanup();onYes();};
  nBtn.onclick=function(){cleanup();};
}
function showPage(n){
  document.querySelectorAll(".page").forEach(function(x){x.classList.remove("on");});
  document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});
  document.getElementById("p"+n).classList.add("on");
  document.getElementById(n==="a"?"ta":"ti").classList.add("on");
  if(n==="a")rdAdmin(); else{rdGrid();}
}

/* 색깔 피커 */
function mkCP(cpId, ci){
  var cp=document.getElementById(cpId);
  cp.innerHTML="";
  for(var i=0;i<CHEX.length;i++){
    (function(idx){
      var el=document.createElement("div");
      el.className="sw-dot"+(idx===ci?" son":"");
      el.style.background=CHEX[idx];
      el.setAttribute("data-ci",String(idx));
      el.addEventListener("click",function(){
        cp.querySelectorAll(".sw-dot").forEach(function(x){x.classList.remove("son");});
        el.classList.add("son");
        if(cpId==="cp") selC=idx;
      });
      cp.appendChild(el);
    })(i);
  }
}
function getCPVal(cpId){
  var el=document.querySelector("#"+cpId+" .sw-dot.son");
  return el?parseInt(el.getAttribute("data-ci"),10):0;
}

/* 프로젝트 그리드 */
function rdGrid(){
  var d=init();
  // 공용물품 분리
  var common=d.p.find(function(x){return x.id==="com";});
  var teams=d.p.filter(function(x){return x.id!=="com";});

  // 공용물품 섹션
  var csec=document.getElementById("common-sec");
  if(common){
    var csub=d.t.filter(function(x){return x.pid==="com"&&x.sub&&!x.dn;});
    var cpnd=d.t.filter(function(x){return x.pid==="com"&&!x.sub;}).length;
    var ps=cpnd?" &middot; <span style='color:#d97706'>미제출 "+cpnd+"개</span>":"";
    var cc=document.createElement("div");
    cc.className="common-card";
    cc.innerHTML="<div style='display:flex;align-items:center;justify-content:space-between'><div><span class='cc-ico' style='font-size:16px'></span> <strong>공용물품</strong> <span style='font-size:11px;color:var(--m);margin-left:4px'>모든 팀 공통</span></div><div style='font-size:12px;color:var(--m)'>제출 "+csub.length+"개"+ps+"</div></div><div style='font-size:12px;color:var(--m);margin-top:6px'>"+(common.desc||"")+"</div>";
    cc.addEventListener("click",function(){selProj("com");});
    csec.innerHTML="";
    csec.appendChild(cc);
    var ccIcon=cc.querySelector('.cc-ico');
    if(ccIcon)ccIcon.textContent="🔧";
    csec.style.display="block";
  } else {
    csec.style.display="none";
  }

  // 팀 프로젝트 그리드
  var g=document.getElementById("pg");
  g.innerHTML="";
  if(!teams.length){
    var el=document.createElement("div");
    el.style.cssText="color:var(--m);grid-column:1/-1;font-size:13px";
    el.textContent="아직 팀 프로젝트가 없어요";
    g.appendChild(el);
    return;
  }
  for(var i=0;i<teams.length;i++){
    (function(p){
      var sub=d.t.filter(function(x){return x.pid===p.id&&x.sub&&!x.dn;});
      var pnd=d.t.filter(function(x){return x.pid===p.id&&!x.sub;}).length;
      var c=CHEX[p.ci]||CHEX[0];
      var card=document.createElement("div");
      card.className="pc";
      card.style.cssText="border-color:"+c+"55";
      var ps=pnd?"<span style='color:#d97706'>미제출 "+pnd+"개</span>":"";
      card.innerHTML=
        "<div class='pn'><span class='dot' style='background:"+c+"'></span>"+p.name+"</div>"+
        "<div class='pd'>"+(p.desc||"소개 없음")+"</div>"+
        "<div class='pm'>&#128100; "+p.lead+" &middot; 제출 "+sub.length+"개 "+ps+"</div>";
      // 수정/삭제 버튼 createElement로 직접 생성
      var actions=document.createElement("div");
      actions.className="proj-actions";
      var editBtn=document.createElement("button");
      editBtn.className="btn-edit";
      editBtn.textContent="수정";
      editBtn.addEventListener("click",function(e){e.stopPropagation();showEditProj(p.id);});
      var delBtn=document.createElement("button");
      delBtn.className="btn-del-proj";
      delBtn.textContent="삭제";
      delBtn.addEventListener("click",function(e){e.stopPropagation();delProj(p.id);});
      actions.appendChild(editBtn);
      actions.appendChild(delBtn);
      card.appendChild(actions);
      card.addEventListener("click",function(e){
        if(!e.target.closest(".proj-actions"))selProj(p.id);
      });
      g.appendChild(card);
    })(teams[i]);
  }
  // 수정/삭제 이벤트

}

/* 프로젝트 생성/수정 폼 */
function showF(v){
  editProjId=null;
  document.getElementById("nf").style.display=v?"block":"none";
  document.getElementById("nf-title").textContent="새 프로젝트 등록";
  document.getElementById("btn-mkproj").textContent="만들기";
  ["nn","nl","nd"].forEach(function(id){document.getElementById(id).value="";});
  if(v){selC=0;mkCP("cp",0);}
}
function showEditProj(id){
  var d=ld(),p=d.p.find(function(x){return x.id===id;});
  if(!p)return;
  editProjId=id;
  document.getElementById("nf").style.display="block";
  document.getElementById("nf-title").textContent="프로젝트 수정";
  document.getElementById("btn-mkproj").textContent="수정 완료";
  document.getElementById("nn").value=p.name;
  document.getElementById("nl").value=p.lead;
  document.getElementById("nd").value=p.desc||"";
  mkCP("cp",p.ci);
  selC=p.ci;
  document.getElementById("nf").scrollIntoView({behavior:"smooth"});
}
function mkProj(){
  var n=document.getElementById("nn").value.trim();
  var l=document.getElementById("nl").value.trim();
  var d2=document.getElementById("nd").value.trim();
  if(!n||!l){toast("이름과 대표자를 입력해주세요","warn");return;}
  var d=ld();
  var ci=getCPVal("cp");
  if(editProjId){
    // 수정
    var p=d.p.find(function(x){return x.id===editProjId;});
    if(!p)return;
    p.name=n;p.lead=l;p.desc=d2;p.ci=ci;
    sv(d);showF(0);rdGrid();
    toast("프로젝트가 수정됐어요");
  } else {
    // 신규
    if(d.p.find(function(x){return x.name===n&&x.id!=="com";})){toast("같은 이름이 있어요","warn");return;}
    d.p.push({id:Date.now().toString(),name:n,lead:l,desc:d2,ci:ci});
    sv(d);["nn","nl","nd"].forEach(function(id){document.getElementById(id).value="";});
    showF(0);rdGrid();
    toast("프로젝트가 만들어졌어요!");
  }
}
function delProj(id){
  var d=ld(),p=d.p.find(function(x){return x.id===id;});
  if(!p)return;
  var cnt=d.t.filter(function(x){return x.pid===id;}).length;
  var msg="["+p.name+"] 프로젝트를 삭제할까요?"+(cnt?"\n(부품 "+cnt+"개도 함께 삭제됩니다)":"");
  customConfirm(msg,function(){
    d.p=d.p.filter(function(x){return x.id!==id;});
    d.t=d.t.filter(function(x){return x.pid!==id;});
    sv(d);
    if(curProj===id){
      curProj=null;
      document.getElementById("vss").style.display="block";
      document.getElementById("vsp").style.display="none";
    }
    rdGrid();
    toast("삭제됐어요");
  });
}

/* 프로젝트 선택 */
function selProj(id){
  var d=ld(),p=d.p.find(function(x){return x.id===id;});
  if(!p)return;
  curProj=id;
  var isCommon=(id==="com");
  var c=isCommon?"#65a30d":(CHEX[p.ci]||CHEX[0]);
  document.getElementById("vss").style.display="none";
  document.getElementById("vsp").style.display="block";
  var anEl=document.getElementById("an");anEl.textContent="";if(isCommon){var sp=document.createElement("span");sp.textContent="🔧";anEl.appendChild(sp);anEl.appendChild(document.createTextNode(" "));}anEl.appendChild(document.createTextNode(p.name));
  document.getElementById("an").style.color=c;
  document.getElementById("al").textContent=(isCommon?"공용 물품":"팀 대표: "+p.lead);
  editPartId=null;
  showPartForm(false);
  rdParts();
}
function goBack(){
  curProj=null;editPartId=null;
  document.getElementById("vss").style.display="block";
  document.getElementById("vsp").style.display="none";
  showPartForm(false);
  rdGrid();
}

/* 부품 폼 */
function showPartForm(v){
  document.getElementById("part-form").style.display=v?"block":"none";
}
function showAddPart(){
  editPartId=null;
  document.getElementById("pf-title").textContent="부품 추가";
  document.getElementById("btn-addpart").textContent="추가 +";
  ["ptn","ptu","ptq","ptp","ptk"].forEach(function(id){document.getElementById(id).value="";});
  showPartForm(true);
  document.getElementById("ptn").focus();
}
function showEditPart(id){
  var d=ld(),t=d.t.find(function(x){return x.id===id;});
  if(!t)return;
  editPartId=id;
  document.getElementById("pf-title").textContent="부품 수정";
  document.getElementById("btn-addpart").textContent="수정 완료";
  document.getElementById("ptn").value=t.name;
  document.getElementById("ptu").value=t.usage||"";
  document.getElementById("ptq").value=t.qty;
  document.getElementById("ptp").value=t.price;
  document.getElementById("ptk").value=t.link||"";
  showPartForm(true);
  document.getElementById("ptn").focus();
}
function cancelPartForm(){editPartId=null;showPartForm(false);}

function savePart(){
  var n=document.getElementById("ptn").value.trim();
  var u=document.getElementById("ptu").value.trim();
  var q=parseInt(document.getElementById("ptq").value)||1;
  var p=parseInt(document.getElementById("ptp").value)||0;
  var k=document.getElementById("ptk").value.trim();
  if(!n||!u){toast("부품명과 사용 목적을 입력해주세요","warn");return;}
  var d=ld();
  if(editPartId){
    // 수정 - 제출 여부 유지(덮어씌우기), 단 구매완료는 해제
    var t=d.t.find(function(x){return x.id===editPartId;});
    if(!t)return;
    t.name=n;t.usage=u;t.qty=q;t.price=p;t.link=k;
    if(t.dn){t.dn=false;toast("수정됐어요. 구매완료가 해제됐어요");}
    else if(t.sub){toast("수정됐어요. 다시 제출하면 반영돼요");}
    else toast("수정됐어요");
    sv(d);editPartId=null;showPartForm(false);rdParts();
  } else {
    d.t.push({id:Date.now().toString(),pid:curProj,name:n,usage:u,qty:q,price:p,link:k,sub:false,dn:false});
    sv(d);
    ["ptn","ptu","ptq","ptp","ptk"].forEach(function(id){document.getElementById(id).value="";});
    document.getElementById("ptn").focus();
    rdParts();toast("부품이 추가됐어요");
  }
}
function delPart(id){
  var d=ld(),t=d.t.find(function(x){return x.id===id;});
  if(!t)return;
  if(t.dn){toast("구매완료 항목은 삭제할 수 없어요","warn");return;}
  customConfirm("["+t.name+"] 을(를) 삭제할까요?",function(){
    d.t=d.t.filter(function(x){return x.id!==id;});
    sv(d);rdParts();toast("삭제됐어요");
  });
}

/* 부품 목록 */
function rdParts(){
  var d=ld(),ts=d.t.filter(function(x){return x.pid===curProj;});
  var pw=document.getElementById("ptw"),pe=document.getElementById("pe");
  var sw=document.getElementById("sbw"),sb=document.getElementById("sbb");
  if(!ts.length){
    pw.style.display="none";pe.style.display="block";
    sw.style.display="none";
    document.getElementById("tl").textContent="";return;
  }
  pw.style.display="block";pe.style.display="none";
  var tot=0,html="";
  for(var i=0;i<ts.length;i++){
    var t=ts[i],s=t.qty*t.price;tot+=s;
    var badge=t.dn?"<span class='bk vd'>구매완료</span>":t.sub?"<span class='bk vs'>제출됨</span> <button class='btn-sm-act' data-unsub='"+t.id+"' style='font-size:10px;padding:2px 6px'>취소</button>":"<span class='bk vp'>미제출</span>";
    var st=t.dn?"opacity:.45;text-decoration:line-through":"";
    var lk=t.link?"<a class='la' href='"+t.link+"' target='_blank'>링크</a>":"-";
    var editBtn=t.dn?"":"<button class='btn-sm-act edit-act' data-eid='"+t.id+"'>수정</button>";
    var delBtn="<button class='btn-sm-act del-act' data-did='"+t.id+"'>삭제</button>";
    html+="<tr style='"+st+"'>"+
      "<td data-label='#' style='color:var(--m);font-size:11px'>"+(i+1)+"</td>"+
      "<td data-label='부품명'><strong>"+t.name+"</strong><br><span style='font-size:11px;color:var(--m)'>"+(t.usage||"")+"</span></td>"+
      "<td data-label='링크'>"+lk+"</td>"+
      "<td data-label='수량'>"+t.qty+"</td>"+
      "<td data-label='단가'>"+t.price.toLocaleString()+"원</td>"+
      "<td data-label='합계' style='font-weight:700'>"+s.toLocaleString()+"원</td>"+
      "<td data-label='상태'>"+badge+"</td>"+
      "<td>"+editBtn+" "+delBtn+"</td>"+
      "</tr>";
  }
  document.getElementById("ptb").innerHTML=html;
  document.getElementById("ptb").querySelectorAll("[data-eid]").forEach(function(btn){
    btn.addEventListener("click",function(){showEditPart(this.getAttribute("data-eid"));});
  });
  document.getElementById("ptb").querySelectorAll("[data-did]").forEach(function(btn){
    btn.addEventListener("click",function(){delPart(this.getAttribute("data-did"));});
  });
  document.getElementById("ptb").querySelectorAll("[data-unsub]").forEach(function(btn){
    btn.addEventListener("click",function(e){e.stopPropagation();unsubPart(this.getAttribute("data-unsub"));});
  });
  document.getElementById("ptt").textContent=tot.toLocaleString()+"원";
  document.getElementById("tl").textContent="총 "+ts.length+"개 \u00B7 "+tot.toLocaleString()+"원";
  var un=ts.filter(function(x){return !x.sub;});
  sw.style.display="block";
  sb.style.display=un.length?"inline-flex":"none";
  sb.textContent=un.length+"개 제출하기";
}
function subParts(){
  var d=ld(),n=0;
  d.t.forEach(function(t){if(t.pid===curProj&&!t.sub){t.sub=true;n++;}});
  if(!n){toast("제출할 부품이 없어요","warn");return;}
  sv(d);rdParts();toast(n+"개 제출됐어요!");
}
function unsubPart(id){
  var d=ld(),t=d.t.find(function(x){return x.id===id;});
  if(!t||t.dn)return;
  customConfirm("["+t.name+"] 제출을 취소할까요?",function(){
    t.sub=false;sv(d);rdParts();toast("제출이 취소됐어요");
  });
}

/* 관리자 */
function rdAdmin(){
  var d=init();
  var sub=d.t.filter(function(x){return x.sub&&!x.dn;});
  var g=sub.reduce(function(s,x){return s+x.qty*x.price;},0);
  document.getElementById("ast").innerHTML=
    "<div class='sc'><div class='sl'>프로젝트</div><div class='sv'>"+d.p.length+"</div></div>"+
    "<div class='sc'><div class='sl'>미구매 부품</div><div class='sv'>"+sub.length+"</div></div>"+
    "<div class='sc'><div class='sl'>미구매 예산</div><div class='sv' style='color:var(--a)'>"+g.toLocaleString()+"원</div></div>";
  var html="";
  for(var i=0;i<d.p.length;i++){
    var p=d.p[i];
    var isCommon=(p.id==="com");
    var c=isCommon?"#65a30d":(CHEX[p.ci]||CHEX[0]);
    var ts=d.t.filter(function(x){return x.pid===p.id&&x.sub;});
    var act=ts.filter(function(x){return !x.dn;});
    var done=ts.filter(function(x){return x.dn;});
    var tot=act.reduce(function(s,x){return s+x.qty*x.price;},0);
    var pnd=d.t.filter(function(x){return x.pid===p.id&&!x.sub;}).length;
    var rows="",all=act.concat(done);
    for(var j=0;j<all.length;j++){
      var t=all[j];
      var lk=t.link?"<a class='la' href='"+t.link+"' target='_blank'>링크</a>":"-";
      var doneBtn=t.dn?
        "<button class='btn-sm-act undo-act' data-undone='"+t.id+"'>해제</button>":
        "<button class='btn-sm-act done-act' data-done='"+t.id+"'>구매완료</button>";
      rows+="<tr style='"+(t.dn?"opacity:.4":"")+"'>"+
        "<td data-label='#' style='color:var(--m);font-size:11px'>"+(j+1)+"</td>"+
        "<td data-label='부품명'><strong>"+t.name+"</strong><br><span style='font-size:11px;color:var(--m)'>"+(t.usage||"")+"</span></td>"+
        "<td data-label='링크'>"+lk+"</td>"+
        "<td data-label='수량'>"+t.qty+"</td>"+
        "<td data-label='단가'>"+t.price.toLocaleString()+"원</td>"+
        "<td data-label='합계' style='font-weight:700'>"+(t.qty*t.price).toLocaleString()+"원</td>"+
        "<td data-label='관리'>"+doneBtn+"</td>"+
        "</tr>";
    }
    var ps=pnd?" · &#9888; 미제출 "+pnd+"개":"";
    var tbl=rows?
      "<table class='tbl' style='background:#fff'>"+
      "<thead style='background:var(--bg)'><tr><th>#</th><th>부품명</th><th>링크</th><th>수량</th><th>단가</th><th>합계</th><th>관리</th></tr></thead>"+
      "<tbody>"+rows+"</tbody>"+
      "<tfoot><tr style='background:"+c+"22;font-weight:700'>"+
      "<td colspan='6' style='padding:10px 18px;font-size:12px;color:"+c+"'>미구매 소계</td>"+
      "<td style='padding:10px 18px;font-size:15px;color:"+c+"'>"+tot.toLocaleString()+"원</td>"+
      "</tr></tfoot></table>":
      "<div style='background:#fff;padding:14px 18px;font-size:13px;color:var(--m)'>제출된 부품이 없어요</div>";
    html+="<div class='pbl'>"+
      "<div class='ph' style='background:"+c+"'>"+
      "<div><div class='phn'>"+(isCommon?"&#128295; ":"&#9679; ")+p.name+"</div>"+
      "<div class='phs'>&#128100; "+p.lead+(p.desc?" &middot; "+p.desc:"")+ps+"</div></div>"+
      "<div class='pht'>"+tot.toLocaleString()+"원</div></div>"+
      tbl+"</div>";
  }
  document.getElementById("ac").innerHTML=html||"<div class='card'><div class='emp'><div class='ei'>&#128203;</div><div class='et'>프로젝트가 없어요</div></div></div>";
  document.getElementById("ac").querySelectorAll("[data-done]").forEach(function(btn){
    btn.addEventListener("click",function(){markDn(this.getAttribute("data-done"));});
  });
  document.getElementById("ac").querySelectorAll("[data-undone]").forEach(function(btn){
    btn.addEventListener("click",function(){unDn(this.getAttribute("data-undone"));});
  });
}
function markDn(id){
  var d=ld(),t=d.t.find(function(x){return x.id===id;});
  if(!t)return;t.dn=true;sv(d);rdAdmin();
  toast("구매 완료 처리됐어요");
}
function unDn(id){
  var d=ld(),t=d.t.find(function(x){return x.id===id;});
  if(!t)return;t.dn=false;sv(d);rdAdmin();
  toast("구매완료가 해제됐어요");
}
function clrAll(){
  customConfirm("정말 모든 데이터를 초기화할까요? 되돌릴 수 없어요.",function(){
    localStorage.removeItem(KEY);rdAdmin();rdGrid();
    toast("초기화 완료");
  });
}

/* 엑셀 */
function dlXls(){
  var d=init(),items=[];
  for(var i=0;i<d.p.length;i++){
    var p=d.p[i];
    var pts=d.t.filter(function(x){return x.pid===p.id&&x.sub&&!x.dn;});
    for(var j=0;j<pts.length;j++){
      items.push({name:pts[j].name,usage:pts[j].usage||"",qty:pts[j].qty,price:pts[j].price,link:pts[j].link||"",proj:p.name,ci:p.ci});
    }
  }
  if(!items.length){toast("미구매 부품이 없어요","warn");return;}

  var b64=document.getElementById("xd").value.trim();
  var bin=atob(b64),buf=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  var wb=XLSX.read(buf,{type:"array",cellStyles:true});
  var ws=wb.Sheets["구매 양식"];
  var now=new Date();
  var ds=now.getFullYear()+"-"+(now.getMonth()+1+"").padStart(2,"0")+"-"+(now.getDate()+"").padStart(2,"0");
  ws["F2"].v=ds;
  ws["B3"].v="배승한";

  var thin={style:"thin",color:{rgb:"000000"}};
  var bA={top:thin,bottom:thin,left:thin,right:thin};
  var bNL={top:thin,bottom:thin,right:thin};
  var hF={patternType:"solid",fgColor:{rgb:"EDEAE7"}};
  var fn="맑은 고딕";

  // B5:C5 merge 해제 (G5 헤더 공간)
  if(ws["!merges"]){
    ws["!merges"]=ws["!merges"].filter(function(m){return !(m.s.r===4&&m.s.c===1&&m.e.c===2);});
  }
  ws["G5"]={v:"프로젝트",t:"s",s:{font:{name:fn,bold:true,sz:11},fill:hF,border:bA,alignment:{horizontal:"center",vertical:"center"}}};

  // 원본 A6:A27 merge 해제 후 아이템 수에 맞게 재설정
  var MAX=Math.max(items.length,1);
  var lastRow=5+MAX; // 아이템 마지막 행
  var sumRow=lastRow+1; // 합계 행

  // 기존 A6:A27 merge 제거
  if(ws["!merges"]){
    ws["!merges"]=ws["!merges"].filter(function(m){return !(m.s.r===5&&m.s.c===0);});
    // B6:C6 ~ B27:C27 기존 merge 모두 제거
    ws["!merges"]=ws["!merges"].filter(function(m){return !(m.s.r>=5&&m.s.r<=26&&m.s.c===1&&m.e.c===2);});
  }

  // 아이템 행 채우기 (부품 수만큼 동적)
  for(var i=0;i<MAX;i++){
    var r=6+i,it=i<items.length?items[i]:null;
    var fill=it?{patternType:"solid",fgColor:{rgb:CRGB[it.ci%8]}}:{};
    var fnt={name:fn,sz:11};
    // B:C merge 추가
    if(!ws["!merges"])ws["!merges"]=[];
    ws["!merges"].push({s:{r:r-1,c:1},e:{r:r-1,c:2}});
    if(!ws["B"+r])ws["B"+r]={};
    Object.assign(ws["B"+r],{v:it?it.name+(it.usage?" ("+it.usage+")":""):"",t:"s",s:{fill:fill,border:bA,font:fnt,alignment:{horizontal:"left",vertical:"center"}}});
    if(!ws["C"+r])ws["C"+r]={};
    Object.assign(ws["C"+r],{v:"",t:"s",s:{fill:fill,border:bNL,font:fnt}});
    if(!ws["D"+r])ws["D"+r]={};
    Object.assign(ws["D"+r],{v:it?it.qty:"",t:it?"n":"s",s:{fill:fill,border:bA,font:fnt,alignment:{horizontal:"center",vertical:"center"}}});
    if(!ws["E"+r])ws["E"+r]={};
    Object.assign(ws["E"+r],{v:it?it.qty*it.price:"",t:it?"n":"s",z:"#,##0",s:{fill:fill,border:bA,font:fnt,alignment:{horizontal:"center",vertical:"center"}}});
    if(!ws["F"+r])ws["F"+r]={};
    Object.assign(ws["F"+r],{v:it?it.link:"",t:"s",s:{fill:fill,border:bA,font:{name:fn,sz:9,color:{rgb:it&&it.link?"1D4ED8":"000000"}},alignment:{horizontal:"center",vertical:"center",wrapText:true}}});
    if(!ws["G"+r])ws["G"+r]={};
    Object.assign(ws["G"+r],{v:it?it.proj:"",t:"s",s:{fill:fill,border:bA,font:{name:fn,sz:9,bold:true},alignment:{horizontal:"center",vertical:"center",wrapText:true}}});
  }

  // A6:A(lastRow) merge - 구매물품 레이블
  if(!ws["!merges"])ws["!merges"]=[];
  ws["!merges"].push({s:{r:5,c:0},e:{r:lastRow-1,c:0}});
  if(!ws["A6"])ws["A6"]={};
  Object.assign(ws["A6"],{v:"구매 물품",t:"s",s:{fill:hF,border:bA,font:{name:fn,bold:true,sz:11},alignment:{horizontal:"center",vertical:"center"}}});

  // 합계행
  ws["!merges"]=ws["!merges"].filter(function(m){return !(m.s.r===27&&m.s.c===0&&m.e.c===3);});
  ws["!merges"].push({s:{r:sumRow-1,c:0},e:{r:sumRow-1,c:3}});
  var sumCell="E"+sumRow;
  if(!ws["A"+sumRow])ws["A"+sumRow]={};
  Object.assign(ws["A"+sumRow],{v:"합 계",t:"s",s:{fill:hF,border:bA,font:{name:fn,sz:11},alignment:{horizontal:"center",vertical:"center"}}});
  var tot=items.reduce(function(s,x){return s+x.qty*x.price;},0);
  if(!ws[sumCell])ws[sumCell]={};
  Object.assign(ws[sumCell],{v:tot,t:"n",z:"#,##0",f:"SUM(E6:E"+lastRow+")",s:{border:bA,font:{name:fn,bold:true,sz:11}}});

  // 범위 업데이트
  ws["!ref"]="A1:G"+(sumRow+20);
  ws["!cols"]=[{wch:13},{wch:20},{wch:6},{wch:7},{wch:13},{wch:30},{wch:14}];
  XLSX.writeFile(wb,"동아리예산신청_"+ds+".xlsx",{cellStyles:true});
  toast("엑셀 다운로드 완료! ("+items.length+"개 부품)");
}
